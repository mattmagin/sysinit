# Hyprland input configuration — managed by chezmoi
# https://wiki.hyprland.org/Configuring/Variables/#input

input {
  kb_layout = us
  kb_variant =
  kb_model =
  # Caps Lock stays as Caps Lock (no remap)
  kb_options =
  kb_rules =

  # Click to focus (don't steal focus on hover)
  follow_mouse = 0

  sensitivity = 0

  # Keyboard repeat
  repeat_rate = 40
  repeat_delay = 600

  # Start with numlock on
  numlock_by_default = true

  touchpad {
    natural_scroll = false

    # Scroll speed
    scroll_factor = 0.4
  }
}

misc {
  key_press_enables_dpms = true
  mouse_move_enables_dpms = true
}

# Terminal scroll adjustments
windowrule = match:class com.mitchellh.ghostty, scroll_touchpad 0.2
