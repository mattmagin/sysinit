# Hyprland window rules — managed by chezmoi
# https://wiki.hyprland.org/Configuring/Window-Rules/

# Suppress maximize requests from all apps
windowrule = suppress_event maximize, match:class .*

# Tag all windows for default opacity
windowrule = tag +default-opacity, match:class .*

# Fix XWayland drag issues
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# ---- App-specific rules ----

# Bitwarden (replaces 1password rules)
windowrule = float, match:class ^bitwarden$
windowrule = size 30% 60%, match:class ^bitwarden$
windowrule = center, match:class ^bitwarden$

# Browser: satty screenshot editor
windowrule = float, match:class com.gabm.satty
windowrule = size 70% 80%, match:class com.gabm.satty
windowrule = center, match:class com.gabm.satty

# Walker app launcher
windowrule = noanim on, match:class ^walker$
windowrule = noborder on, match:class ^walker$
windowrule = noshadow on, match:class ^walker$

# Calculator
windowrule = float, match:class org.gnome.Calculator
windowrule = size 400 600, match:class org.gnome.Calculator

# Picture-in-picture
windowrule = float, match:title ^Picture.in.[Pp]icture$
windowrule = size 25% 25%, match:title ^Picture.in.[Pp]icture$
windowrule = move 73% 72%, match:title ^Picture.in.[Pp]icture$
windowrule = pin on, match:title ^Picture.in.[Pp]icture$

# Terminals: remove default opacity (they manage their own)
windowrule = tag -default-opacity, match:class com.mitchellh.ghostty

# System/polkit dialogs
windowrule = float, match:class ^polkit-gnome-authentication-agent-1$
windowrule = size 400 200, match:class ^polkit-gnome-authentication-agent-1$
windowrule = center, match:class ^polkit-gnome-authentication-agent-1$

# Apply default opacity last
windowrule = opacity 0.97 0.9, match:tag default-opacity
